name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Validate required env vars
      run: |
        [ -n "$DATABASE_URL" ] || (echo "Missing DATABASE_URL" && exit 1)
        [ -n "$VITE_SUPABASE_KEY" ] || (echo "Missing VITE_SUPABASE_KEY" && exit 1)
        [ -n "$VITE_SUPABASE_URL" ] || (echo "Missing VITE_SUPABASE_URL" && exit 1)
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Start app server
      run: PLAYWRIGHT=true npm run dev -- --host 0.0.0.0 > app.log 2>&1 &
    - name: Wait for app server
      run: npx wait-on http://127.0.0.1:3000 --timeout 120000
    - name: Run Playwright tests
      run: PLAYWRIGHT_BASE_URL=http://127.0.0.1:3000 PLAYWRIGHT_SKIP_WEBSERVER=true npx playwright test
    - name: Print app logs
      if: ${{ always() }}
      run: cat app.log
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
